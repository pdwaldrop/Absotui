name: Release

permissions:
  contents: write

on:
  release:
    types: [created, published]
  workflow_dispatch:

jobs:
  # No separate "create the release" job: we create and write the release
  # ourselves (gh release create, with our own notes) before this workflow ever
  # runs. This job only needs to build binaries and attach them to whatever
  # release already exists for the tag - it must not touch the release's own
  # draft/published state, since that job used to force it back to draft (and
  # wipe our release notes) every time this workflow fired.
  upload-assets:
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
         # - target: aarch64-apple-darwin
         #   os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
         # - target: x86_64-apple-darwin
         #   os: macos-latest
          # Universal macOS binary is supported as universal-apple-darwin.
          - target: universal-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          # (required) Comma-separated list of binary names (non-extension portion of filename) to build and upload.
          # Note that glob pattern is not supported yet.
          bin: absotui
          # (optional) Target triple, default is host triple.
          target: ${{ matrix.target }}
          # (required) GitHub token for uploading assets to GitHub Releases.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare assets
        run: |
          mkdir -p dist
          cp ./config.example.toml dist/
          cp ./linux/absotui.desktop dist/
          cp ./linux/absotui.svg dist/
          cp ./hello_absotui.sh dist/
          
      - name: Create GitHub release and upload files
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Generates a checksums manifest from the release's actual uploaded assets, once
  # they all exist, so hello_absotui.sh can verify downloads against real values
  # fetched at install time instead of hardcoding checksums into the script itself -
  # those went stale on every release, since CI only builds the real binaries after
  # a release is cut.
  generate-checksums:
    needs: upload-assets
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p assets
          gh release download "${{ github.ref_name }}" --repo "${{ github.repository }}" --dir assets --clobber

      - name: Generate SHA256SUMS.txt
        run: |
          cd assets
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload checksums manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" assets/SHA256SUMS.txt --repo "${{ github.repository }}" --clobber
